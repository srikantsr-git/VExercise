<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness AI Chat - ExerciseDB</title>
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #f4f4f5;
      color: #111111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Design Tokens ──────────────────────────────── */
    :root {
      --accent: #ff4f00;
      --accent-muted: rgba(255, 79, 0, 0.08);
      --bg-base: #f4f4f5;
      --bg-surface: #ffffff;
      --bg-elevated: #f0f0f1;
      --border: #e4e4e7;
      --text-primary: #111111;
      --text-secondary: #71717a;
      --text-tertiary: #a1a1aa;
      --radius-md: 10px;
      --radius-lg: 14px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Header ─────────────────────────────────────── */
    .chat-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
      height: 60px;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .chat-title span {
      color: var(--accent);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--text-primary);
      border-color: var(--accent);
      background: var(--accent-muted);
    }

    .back-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Chat Container ─────────────────────────────── */
    .chat-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 3px;
    }

    /* ── Message Bubble ─────────────────────────────── */
    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .message.user .message-bubble {
      background: var(--accent);
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-bubble {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .message.user .message-time {
      text-align: right;
    }

    .message.assistant .message-time {
      text-align: left;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.user .message-avatar {
      background: var(--accent);
      color: #fff;
    }

    .message.assistant .message-avatar {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    /* ── Loading State ──────────────────────────────── */
    .message.loading .message-bubble {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    /* ── Error Message ──────────────────────────────– */
    .message.error .message-bubble {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    /* ── Input Area ──────────────────────────────────– */
    .chat-input-wrapper {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
      height: auto;
    }

    .input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      transition: var(--transition);
    }

    .input-field:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }

    .message-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      resize: none;
      max-height: 100px;
      min-height: 20px;
    }

    .message-input::placeholder {
      color: var(--text-tertiary);
    }

    .send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #e04700;
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Empty State ─────────────────────────────────– */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .empty-state-text {
      font-size: 14px;
      max-width: 320px;
    }

    /* ── Config Panel ────────────────────────────────– */
    .config-panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
    }

    .config-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .config-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .config-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 12px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .config-input::placeholder {
      color: var(--text-tertiary);
    }

    .config-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }

    /* ── Responsive ──────────────────────────────────– */
    @media (max-width: 768px) {
      .chat-header {
        padding: 12px 14px;
        height: 52px;
      }

      .chat-messages {
        padding: 14px;
        gap: 12px;
      }

      .message-bubble {
        max-width: 85%;
      }

      .chat-input-wrapper {
        padding: 12px 14px;
      }

      .chat-title {
        font-size: 14px;
      }

      .back-link {
        padding: 4px 8px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .chat-header-left {
        gap: 8px;
      }

      .message-bubble {
        max-width: 90%;
        padding: 10px 12px;
        font-size: 13px;
      }

      .message-avatar {
        width: 24px;
        height: 24px;
        font-size: 12px;
      }

      .send-btn {
        width: 32px;
        height: 32px;
      }

      .send-btn svg {
        width: 16px;
        height: 16px;
      }

      .chat-title {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="chat-header">
  <div class="chat-header-left">
    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <h1 class="chat-title">💬 Fitness <span>AI Chat</span></h1>
  </div>
  <div class="status-indicator"></div>
</header>

<!-- Chat Container -->
<div class="chat-container">
  <div class="chat-messages" id="chat-messages">
    <div class="empty-state">
      <div class="empty-state-icon">🤖</div>
      <div class="empty-state-title">Fitness AI Assistant</div>
      <div class="empty-state-text">Ask me anything about exercises, workouts, or fitness training!</div>
    </div>
  </div>
</div>

<!-- Input Area -->
<div class="chat-input-wrapper">
  <div class="config-panel" id="config-panel">
    <div class="config-title">⚙️ Configuration</div>
    <div class="config-group">
      <label class="config-label">API Key (from environment)</label>
      <input type="password" class="config-input" id="api-key-input" placeholder="Using MCP_9ARM_AUTH from env" disabled />
    </div>
  </div>

  <div class="input-area">
    <div class="input-field">
      <input
        type="text"
        class="message-input"
        id="message-input"
        placeholder="Ask about exercises, workouts, muscles..."
        autocomplete="off"
      />
    </div>
    <button class="send-btn" id="send-btn" title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
      </svg>
    </button>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════
  // Chat Configuration
  // ═══════════════════════════════════════════════════

  const API_ENDPOINT = 'https://gateway.9arm.co/v1/chat/completions';
  const API_KEY_ENV = '${{ secrets.MCP_9ARM_AUTH }}';
  
  let apiKey = API_KEY_ENV;
  let conversationHistory = [];

  const elements = {
    chatMessages: document.getElementById('chat-messages'),
    messageInput: document.getElementById('message-input'),
    sendBtn: document.getElementById('send-btn'),
    apiKeyInput: document.getElementById('api-key-input'),
    configPanel: document.getElementById('config-panel')
  };

  // Initialize
  function init() {
    // Try to get API key from localStorage or environment
    apiKey = localStorage.getItem('mcp_9arm_key');
    
    if (!apiKey) {
      // Show config panel to get API key
      showConfigPanel();
    } else {
      elements.configPanel.style.display = 'none';
    }

    setupEventListeners();
  }

  function setupEventListeners() {
    elements.messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    elements.sendBtn.addEventListener('click', sendMessage);

    elements.apiKeyInput.addEventListener('blur', () => {
      if (elements.apiKeyInput.value) {
        apiKey = elements.apiKeyInput.value;
        localStorage.setItem('mcp_9arm_key', apiKey);
        elements.configPanel.style.display = 'none';
      }
    });
  }

  function showConfigPanel() {
    elements.configPanel.style.display = 'block';
    elements.apiKeyInput.focus();
  }

  // ═══════════════════════════════════════════════════
  // Chat Functions
  // ═══════════════════════════════════════════════════

  async function sendMessage() {
    const message = elements.messageInput.value.trim();
    
    if (!message) return;

    if (!apiKey) {
      showErrorMessage('Please configure your API key first');
      return;
    }

    // Clear input
    elements.messageInput.value = '';
    elements.messageInput.style.height = 'auto';

    // Add user message
    addMessage(message, 'user');

    // Add loading indicator
    const loadingId = addLoadingMessage();

    try {
      const response = await callAPI(message);
      removeLoadingMessage(loadingId);
      addMessage(response, 'assistant');
    } catch (error) {
      removeLoadingMessage(loadingId);
      addMessage(`Error: ${error.message}`, 'error');
    }
  }

  async function callAPI(message) {
    conversationHistory.push({
      role: 'user',
      content: message
    });

    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'qwen3.6-35b-a3b',
        messages: conversationHistory,
        temperature: 0.7,
        max_tokens: 1000
      })
    });

    if (!response.ok) {
      throw new Error(`API Error: ${response.status} ${response.statusText}`);
    }

    const data = await response.json();
    const assistantMessage = data.choices[0].message.content;
    
    conversationHistory.push({
      role: 'assistant',
      content: assistantMessage
    });

    return assistantMessage;
  }

  function addMessage(text, role) {
    // Clear empty state if exists
    const emptyState = elements.chatMessages.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    const messageEl = document.createElement('div');
    messageEl.className = `message ${role}`;

    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const avatarEmoji = role === 'user' ? '👤' : '🤖';
    
    messageEl.innerHTML = `
      <div class="message-avatar">${avatarEmoji}</div>
      <div>
        <div class="message-bubble">${escapeHtml(text)}</div>
        <div class="message-time">${timeStr}</div>
      </div>
    `;

    elements.chatMessages.appendChild(messageEl);
    elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;

    return messageEl;
  }

  function addLoadingMessage() {
    const messageEl = document.createElement('div');
    messageEl.className = 'message assistant loading';
    const id = 'loading-' + Date.now();
    messageEl.id = id;

    messageEl.innerHTML = `
      <div class="message-avatar">🤖</div>
      <div>
        <div class="message-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;

    elements.chatMessages.appendChild(messageEl);
    elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;

    return id;
  }

  function removeLoadingMessage(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function showErrorMessage(text) {
    const messageEl = document.createElement('div');
    messageEl.className = 'message error';

    messageEl.innerHTML = `
      <div class="message-avatar">⚠️</div>
      <div>
        <div class="message-bubble">${escapeHtml(text)}</div>
      </div>
    `;

    elements.chatMessages.appendChild(messageEl);
    elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
  }

  function escapeHtml(text) {
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  // Auto-resize textarea
  elements.messageInput.addEventListener('input', () => {
    elements.messageInput.style.height = 'auto';
    elements.messageInput.style.height = Math.min(elements.messageInput.scrollHeight, 100) + 'px';
  });

  // Initialize on load
  window.addEventListener('load', init);
</script>

</body>
</html>
